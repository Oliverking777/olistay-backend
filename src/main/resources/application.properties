# =============================================================================
# OLISTAY ? Backend Application Properties
# =============================================================================
# IMPORTANT: Never commit real secrets to version control.
# Replace every value marked [CHANGE_ME] with an environment variable or a
# local application-local.properties file listed in .gitignore.
# =============================================================================

# ---------------------------------------------------------------------------
# Application
# ---------------------------------------------------------------------------
spring.application.name=backend
server.port=${PORT:8082}

# ---------------------------------------------------------------------------
# DataSource ? PostgreSQL
# ---------------------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/olistay_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:newpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---------------------------------------------------------------------------
# JWT ? Access Token
# ---------------------------------------------------------------------------
# Must be at least 32 characters (256 bits) for HMAC-SHA256.
# Production: set the JWT_SECRET environment variable, never hardcode it here.
jwt.secret=${JWT_SECRET:8984014cb801dc0bd2a4053fc5908dc1c845e31c9bd218043a1a4abf878b43589468c1cfd82f22524c00ee0fc4a33698d30327c8e1a5b16bd902ca8df4fe1a8d}

# Access token lifetime: 15 minutes
jwt.access-expiration-ms=900000

# ---------------------------------------------------------------------------
# JWT ? Refresh Token
# ---------------------------------------------------------------------------
# Refresh token lifetime: 7 days
jwt.refresh-expiration-ms=604800000

# Grace window for the double-refresh race condition fix:
# a used refresh token presented again within this many seconds is treated
# as a duplicate request rather than token theft.
jwt.refresh-grace-window-seconds=5

# Name of the httpOnly cookie that carries the refresh token.
jwt.refresh-cookie-name=refreshToken


# ---------------------------------------------------------------------------
# Cloudinary ? Property Image Storage
# ---------------------------------------------------------------------------
# Get these from your Cloudinary dashboard (cloudinary.com/console).
# Production: set CLOUDINARY_CLOUD_NAME / CLOUDINARY_API_KEY / CLOUDINARY_API_SECRET
# as environment variables, never hardcode the secret here.
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dy1gewvvo}
cloudinary.api-key=${CLOUDINARY_API_KEY:427964494458538}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:vaCSWairQ8ILXyQ4pRKRT4Blr2M}

# ---------------------------------------------------------------------------
# Multipart upload limits
# ---------------------------------------------------------------------------
# Spring's default max-file-size is 1MB ? too small for property photos.
# Must be >= CloudinaryServiceImpl's MAX_FILE_SIZE_BYTES (10MB) or valid
# uploads will be rejected by Spring before CloudinaryService ever sees them.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

---------------------------------------------------------------------------
# FastAPI AI Engine
# ---------------------------------------------------------------------------
# Base URL of the OLISTAY AI Engine (financial profiler, rent predictor,
# scoring, recommender). See main.py ? defaults to port 8000 in development.
ml.engine.base-url=${ML_ENGINE_BASE_URL:http://localhost:8000}

# Timeout for ML engine HTTP calls. The recommender pipeline (Stage 1-4)
# can take longer than simple scoring calls, especially with many candidate
# properties, so this is generous.
ml.engine.connect-timeout-ms=5000
ml.engine.read-timeout-ms=30000


